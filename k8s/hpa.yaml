apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cintent-api
  namespace: cintent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cintent-api
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
