apiVersion: apps/v1
kind: Deployment
metadata:
  name: cintent-api
  namespace: cintent
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cintent-api
  template:
    metadata:
      labels:
        app: cintent-api
    spec:
      containers:
        - name: api
          image: ghcr.io/cognivantalabs/cintent-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: cintent-config
            - secretRef:
                name: cintent-secrets
          readinessProbe:
            httpGet:
              path: /api/ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
